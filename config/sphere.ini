// ============================================================================
// SphereNet Konfigürasyon Dosyası — Source-X Uyumlu
// CServerConfig karşılığı
//
// Sözdizimi: ANAHTAR=DEĞER
// Yorumlar // ile başlar
// Hex değerler: 0x öneki (örn: 0x20)
// Boolean: 0=hayır, 1=evet
//
// DURUM ETİKETLERİ:
//   [ÇALIŞIYOR]      = Kod tarafından aktif olarak kullanılıyor
//   [OKUNUYOR]        = Config'e yükleniyor ama oyun kodunda henüz kullanılmıyor
//   [UYGULANMADI]     = Config'e bile yüklenmiyor, sadece yer tutucu
// ============================================================================

[SPHERE]
DebugPackets=0
ScriptDebug=0

// ClientEra - varsayilan client uyumluluk profili.
// Sphere56x: bilinmeyen client eski Sphere 56x paket formatlarini kullanir.
// Modern: client version gelene kadar ClassicUO/7.x gibi modern formatlar varsayilir.
// [CALISIYOR]
ClientEra=Sphere56x
// Opsiyonel paket debug filtresi (hex opcode listesi, virgülle ayır):
// Boş bırakılırsa tüm paketler loglanır (0x73 ping hariç).
// Örnek: sadece resync/status/extended izlemek için:
DebugPacketOpcodes=22,34,BF

// LogFileLevel - logs/spherenet-*.log dosyasinin filtresi.
// Console cikti seviyesi DebugPackets'ten bagimsiz; bu sadece dosyaya
// yazilani etkiler — komutlar / script okumalari / baglantilar gibi
// rutin INF mesajlari diske gitmez, dosyalar kucuk ve "ne ters gitti?"
// odakli kalir.
//
// Iki farkli sozdizimi destekleniyor:
//   1) Tek deger  → minimum esik. O seviye ve YUKARISI dosyaya yazilir.
//        LogFileLevel=Warning      → WRN, ERR, FTL
//        LogFileLevel=Error        → sadece ERR + FTL
//        LogFileLevel=Information  → konsoldakinin aynisi (INF + ustu)
//   2) Pipe (|) / virgul ile beyaz liste → SADECE listede olan
//      seviyeler dosyaya yazilir. Aradaki seviyeler atlanir.
//        LogFileLevel=Verbose | Warning | Error | Fatal
//          (Debug ve Information yazilmaz, Verbose izleri ve gercek
//           hatalar yazilir — debug oturumlari icin kullanisli)
//        LogFileLevel=Error, Fatal
//          (sadece olumcul olaylar)
//
// Gecerli seviye adlari (buyuk/kucuk harf farketmez):
//   Verbose, Debug, Information, Warning, Error, Fatal
// Varsayilan: Warning  (yalnizca WRN/ERR/FTL diske yazilir)
LogFileLevel=Warning



// ============================================================================
// PERFORMANS & MULTICORE
// ============================================================================

// Main loop CPU yield strategy: 
// 0 = spin   — Lowest latency (<1ms), highest CPU. Dedicated sunucular icin.                                           
// 1 = sleep  Minimal CPU, ~15ms latency. Dusuk donanim/paylasimli sunucular icin.   
// 2 = hybrid — Dengeli, ~1ms latency, orta CPU. (varsayilan)   
TickSleepMode=2

// Tani uyari esikleri (ms). SlowTickWarnMs'den yavas server tick [slow_tick],
// LoopStallWarnMs'den yavas ana-dongu iterasyonu [loop_stall] uyarisi loglar.
// 0 = o uyari kapali. Varsayilan: 50 / 100 (100ms tick butcesinin yarisi / tamami).
SlowTickWarnMs=50
LoopStallWarnMs=100

// Tek bir gelen paketin handler'i bu esikten uzun surerse [slow_packet] uyarisi
// loglanir (opcode + handler adi + sure). net_in kaynakli loop_stall'un hangi
// paketten geldigini isimlendirir. 0 = kapali.
SlowPacketWarnMs=20

// Multicore tick pipeline her zaman aciktir — Build(paralel) → Apply(seri).
// Hata veya timeout durumunda otomatik olarak tek thread'e dusulur; knob yok.

// MulticoreWorkerCount - Paralel fazlarda kullanilacak is parcacigi sayisi.
// Tur: integer (0=otomatik ProcessorCount)
// Varsayilan: 0
// [CALISIYOR] — Parallel.ForEach MaxDegreeOfParallelism degeri.
MulticoreWorkerCount=0

// MulticorePhaseTimeoutMs - Multicore faz timeout suresi (milisaniye).
// Tur: integer (ms, min 100)
// Varsayilan: 5000
// Not: Asildiginda _multicoreRuntimeEnabled=false olur ve tek thread'e donulur.
// [CALISIYOR] — CancellationTokenSource timeout degeri.
MulticorePhaseTimeoutMs=5000

// MulticoreDeterminismDebug - Determinizm dogrulama modu.
// Tur: boolean (0/1)
// Varsayilan: 0
// Not: Aktifken her tick sonunda SHA-256 hash hesaplanir ve loglanir.
// [CALISIYOR] — MaybeRunDeterminismGuardrail() calistirir.
MulticoreDeterminismDebug=0

// MulticoreDeterminismExpectedHash - Beklenen determinizm hash degeri.
// Tur: string (SHA-256 hex, bos=kontrol yok)
// Varsayilan: ""
// [CALISIYOR] — Hash uyusmazliginda uyari loglanir.
MulticoreDeterminismExpectedHash=

// ============================================================================
// SUNUCU KİMLİĞİ
// ============================================================================

// SERVNAME - Sunucu listesinde ve durum sayfasında görünen ad.
// Tür: string
// Varsayılan: "SphereNet"
// [ÇALIŞIYOR] — WebStatusServer ve TelnetConsole'da kullanılır.
SERVNAME=SphereNet

// SERVPORT - Oyun sunucusunun dinlediği TCP portu.
// Tür: integer (1-65535)
// Varsayılan: 2593
// Not: Standart UO portu 2593. Telnet konsol: SERVPORT+1, web durum: SERVPORT+2.
// [ÇALIŞIYOR] — NetworkManager.Start() bu portu kullanır.
SERVPORT=2593

// ADMINPASSWORD - Telnet yönetim konsolu şifresi.
// Tür: string
// Varsayılan: "" (boş = telnet admin devre dışı)
// [ÇALIŞIYOR] — TelnetConsole bu şifreyi kontrol eder.
ADMINPASSWORD=

// ADMINPANELPORT - Web Panel Port
// Tür: integer
// Varsayılan: 9999
// [ÇALIŞIYOR]
ADMINPANELPORT=9999

// APPUPDATEREPODIR - update.cmd (tek-komut guncelleme) icin kaynak (git) klasoru.
// SADECE update.cmd/update.ps1 tarafindan okunur; SphereNet.Host kullanmaz.
// Bu calisma klasoru yalnizca publish edilmis binary'lerden olusuyorsa (orn.
// C:\sphereNet), burayi git klonuna isaret ettir. update.cmd o klonda
// git pull + build.ps1 calistirir, sonra uretilen binary'leri buraya kopyalar.
// O makinede git + .NET SDK + Node/npm kurulu olmali. Goreli yol sphere.ini'ye
// gore cozulur. Calisma klasoru = repo ise bos birakilabilir. Ornek:
// APPUPDATEREPODIR=D:\Projeler\Yunus\sphereNet
APPUPDATEREPODIR=

// ============================================================================
// İSTEMCİ & BAĞLANTI AYARLARI
// ============================================================================

// CLIENTVERSION - Beklenen istemci sürüm dizgisi.
// Tür: string (format: major.minor.revision.patch)
// Varsayılan: "7.0.96.5"
// Örnekler:
//   "4.0.2"     - T2A dönemi istemcisi
//   "5.0.9.1"   - AOS dönemi istemcisi
//   "7.0.96.5"  - Son klasik istemci
// [ÇALIŞIYOR] — GameClient.HandleClientVersion() ile karşılaştırılır.
CLIENTVERSION=7.0.96.5

// CLIENTMAX - Aynı anda bağlanabilecek maksimum istemci sayısı.
// Tür: integer (1-4096)
// Varsayılan: 256
// Not: Her bağlantı bir NetState slotu kullanır. Yüksek değer = daha fazla bellek.
// [ÇALIŞIYOR] — NetworkManager constructor'ına geçirilir, slot havuzu bu kadar.
CLIENTMAX=1100

// CLIENTMAXIP - Tek bir IP adresinden maksimum bağlantı sayısı.
// Tür: integer (0-256, 0=sınırsız)
// Varsayılan: 16
// [OKUNUYOR] — Config'e yükleniyor ama NetworkManager IP başına kontrol yapmıyor.
CLIENTMAXIP=16

// CLIENTLINGER - Bağlantı kopan istemcinin durumunun tutulma süresi (saniye).
// Tür: integer (saniye, 0-3600)
// Varsayılan: 300
// Not: Linkdead timeout — yeniden bağlanma için durum korunur.
// [OKUNUYOR] — Config'e yükleniyor ama NetState'te linkdead zamanlayıcı yok.
CLIENTLINGER=300

// CONNECTINGMAX - Giriş yapma aşamasındaki (pre-login) maksimum istemci sayısı.
// Tür: integer (1-256)
// Varsayılan: 32
// [OKUNUYOR] — Config'e yükleniyor ama ayrı "connecting" limiti uygulanmıyor.
CONNECTINGMAX=32

// CONNECTINGMAXIP - IP başına maksimum bağlanan istemci sayısı.
// Tür: integer (0-64, 0=sınırsız)
// Varsayılan: 8
// [UYGULANMADI] — SphereConfig'de tanımlı değil.
CONNECTINGMAXIP=8

// USECRYPT - Giriş şifrelemesini etkinleştir (Blowfish/Twofish).
// Tür: boolean (0/1)
// Varsayılan: 1
// Değerler:
//   0 = Sadece şifresiz istemci kabul et
//   1 = Şifreli istemci kabul et (standart UO)
// [ÇALIŞIYOR] — CryptoEngine şifreleme seçiminde kullanılır.
USECRYPT=1

// USENOCRYPT - Şifreli bağlantıların yanı sıra şifresiz bağlantıları da kabul et.
// Tür: boolean (0/1)
// Varsayılan: 0
// [ÇALIŞIYOR] — USECRYPT ile birlikte çalışır.
USENOCRYPT=1

// Uses the new LoS algorithm
// ADVANCEDLOS_DISABLED   00 // Disabled, use the old method
// ADVANCEDLOS_PLAYER     01 // Enabled only for players
// ADVANCEDLOS_NPC        02 // Enabled only for NPCs
AdvancedLos=0

// Default color settings for characters names (notoriety)
//ColorNotoGood=059			// blue
//ColorNotoGoodNPC=059		// blue
//ColorNotoGuildSame=03f	// green (ally)
//ColorNotoNeutral=03b2		// grey (can be attacked)
//ColorNotoCriminal=03b2	// grey (criminal)
//ColorNotoGuildWar=090		// orange (enemy guild)
//ColorNotoEvil=022			// red
//ColorNotoInvul=035		// yellow
//ColorNotoInvulGameMaster=0b	// purple
//ColorNotoDefault=03b2		// grey (if not any other)

ColorInvisItem=1000		// 0 = default item color, 01 to 04001 = custom color, 1000 = invis Grey color (Define how the invis item are see by GM)

// When changing one of these 3 settings, the color set will appear on the anim of player AND on the paperdoll.
ColorInvis=0			// 04001 = transparent color, 0 = default (Gm invisibilily)
ColorInvisSpell=0		// 04001 = transparent color, 0 = default (This one is for s_invisibility spell, this includes the invis potion.)
ColorHidden=0			// 04001 = transparent color, 0 = default

// Which notoriety flags do pets inherit from their masters? (default 0)
// Set flags to indicate which notoriety statuses a pet can inherit from its owner.
//  NotoGood        001  // blue
//  NotoGuildSame   002  // green (ally)
//  NotoNeutral     004  // grey (can be attacked)
//  NotoCriminal    008  // grey (criminal)
//  NotoGuildWar    010  // orange (enemy guild)
//  NotoEvil        020  // red
//  NotoInvul       040  // yellow
// e.g. "07a" will show pets as criminal/warring/evil/allied/invul when their master has
//      one of these statuses, regardless of the pet's true notoriety.
PetsInheritNotoriety=0

// ============================================================================
// GENIŞLEME PAKETİ BAYRAKLARI (EXPANSION SUPPORT)
// ============================================================================
// Her bayrak genişleme paketine özel özellikleri ve istemci paketlerini etkinleştirir.
// 0 = devre dışı, hex bitmask = etkin.
// Sunucu tüm etkin bayrakların OR'unu istemciye gönderir.

// NOT: FEATURE* anahtarlari tumu OR'lanip login'de 0xB9 PacketFeatureEnable
// paketi ile istemciye gonderilir. GameClient.ServerFeatureFlags config'ten
// doldurulur (Program.cs).

// FEATURET2A - The Second Age (1998)
// Tür: hex/integer | Source-X FEATURE_T2A capability maskesi (update/chat).
// Ham 0xB9 biti değildir; istemci ResDisp seviyesine göre protokol bitlerine çevrilir.
FEATURET2A=0x3

// FEATURELBR - Lord Blackthorn's Revenge (2002)
// Tür: hex/integer | Source-X FEATURE_LBR capability maskesi (update/sound).
FEATURELBR=0x3

// FEATUREAOS - Age of Shadows (2003)
// Tür: hex/integer | Source-X FEATURE_AOS capability maskesi.
// update-A/update-B/popup/tooltip alt özelliklerini içerir.
FEATUREAOS=0xF

// FEATURESE - Samurai Empire (2004)
// Tür: hex/integer | Source-X FEATURE_SE capability maskesi.
FEATURESE=0x3

// FEATUREML - Mondain's Legacy (2005)
// Tür: hex/integer | Source-X FEATURE_ML capability maskesi.
FEATUREML=0x1

// FEATUREKR - Kingdom Reborn istemci desteği (2007)
// Tür: hex/integer
// Varsayılan: 0
// Not: KR istemcisi artık kullanılmıyor.
// [CALISIYOR]
FEATUREKR=0

// FEATURESA - Stygian Abyss (2009)
// Tür: hex/integer | Source-X FEATURE_SA capability maskesi.
FEATURESA=0x3

// FEATURETOL - Time of Legends (2015)
// Tür: hex/integer | Source-X FEATURE_TOL capability maskesi.
FEATURETOL=0x1

// FEATUREEXTRA - Özel genişleme bitleri.
// Tür: hex/integer
// Varsayılan: 0
// [CALISIYOR] — FeatureFlags OR'una dahil.
FEATUREEXTRA=0

// OPTIONFLAGS - Sunucu ek özellik bayrakları.
// Tür: hex/integer (bit-flag)
// Varsayılan: 0
// Bitler:
//   0x0080 (OF_FileCommands) = Script'lerde FILE.* komutlarını etkinleştir
//     (FILE.OPEN, FILE.READLINE, FILE.WRITELINE vb.)
//   0x2000 (OF_Buffs) = Native buff/debuff iconlarını etkinleştir
// [ÇALIŞIYOR] — HasFileCommands kontrolü ile FILE script objesi aktif edilir.
OPTIONFLAGS=0x2080

// ============================================================================
// HARİTA YAPILANDIRMASI
// ============================================================================
// Format: MAP<id>=genişlik,yükseklik,sektörBoyutu,mulOkumaIndex,istemciHaritaId
//
// Parametreler:
//   genişlik     - Harita genişliği (tile) — .mul dosyasıyla eşleşmeli
//   yükseklik    - Harita yüksekliği (tile)
//   sektörBoyutu - Sektör ızgara boyutu (genelde 64, spatial indeksleme için)
//   mulOkumaIndex - Hangi map<N>.mul / statics<N>.mul dosyasını okuyacak
//   istemciHaritaId - İstemciye gönderilen harita ID'si
//
// Standart UO Haritaları:
//   MAP0 = Felucca     (6144x4096)
//   MAP1 = Trammel     (6144x4096)
//   MAP2 = Ilshenar    (2304x1600)
//   MAP3 = Malas        (2560x2048)
//   MAP4 = Tokuno       (1448x1448)
//   MAP5 = Ter Mur      (1280x4096)
// [ÇALIŞIYOR] — GameWorld sektör oluşturma ve MapDataManager init'te kullanılır.

// 7168 = T2A/Lost Lands dahil tam map0 genisligi (6144 Lost Lands'i keser;
// mortechUO teleport defleri x>6144 kullanir).
MAP0=7168,4096,64,0,0
MAP1=7168,4096,64,1,1
// MAP2=2304,1600,64,2,2
// MAP3=2560,2048,64,3,3
// MAP4=1448,1448,64,4,4
// MAP5=1280,4096,64,5,5

// ============================================================================
// DOSYA YOLLARI
// ============================================================================
// Tüm yollar sunucu çalıştırılabilir dosyasının bulunduğu dizine göre.

// MULFILES - UO istemci veri dosyalarının yolu (map*.mul, statics*.mul, tiledata.mul vb.)
// Tür: string (dizin yolu)
// Varsayılan: "mul/"
// [ÇALIŞIYOR] — MapDataManager bu yolu kullanır.
MULFILES=mul/

// SCPFILES - Sunucu script dosyalarının yolu (.scp formatı)
// Tür: string (dizin yolu)
// Varsayılan: "scripts/"
// Not: [ITEMDEF], [CHARDEF], [SPELL], [SKILLDEF] vb. bölümleri içerir.
// [ÇALIŞIYOR] — ResourceHolder bu dizini tarar.
// Source-X manifest root. spheretables.scp controls the exact load order;
// directories/files commented out there are intentionally not loaded.
SCPFILES=oldSphere/Scripts-X-main/

// Script text decoding: AUTO, UTF8 or LEGACY.
// AUTO validates UTF-8 first, then falls back to the legacy code page.
SCRIPTENCODING=AUTO
SCRIPTLEGACYCODEPAGE=1252

// LOG - Log çıktı dizini.
// Tür: string (dizin yolu)
// Varsayılan: "logs/"
// [ÇALIŞIYOR] — Serilog bu yolu kullanır.
LOG=logs/

// ============================================================================
// KAYDETME AYARLARI
// ============================================================================

// SAVEPERIOD - Otomatik kaydetme aralığı (dakika).
// Tür: integer (dakika, 0=otomatik kaydetme devre dışı)
// Varsayılan: 20
// [ÇALIŞIYOR] — Program.cs ana döngüde otomatik kaydetme zamanlayıcısı bu değeri kullanır.
SAVEPERIOD=20

// SAVESECTORSPERTICK - Arka plan kaydında tick başına kaydedilen sektör sayısı.
// Tür: integer (1-100)
// Varsayılan: 1
// [OKUNUYOR] — Config'e yükleniyor ama WorldSaver arka plan kaydı desteklemiyor.
SAVESECTORSPERTICK=1

// SAVEBACKGROUND - Arka plan (kademeli) kaydetmeyi etkinleştir.
// Tür: boolean (0/1)
// Varsayılan: 0
// Değerler:
//   0 = Tam kayıt (dünyayı kısa süreliğine duraklatır, daha güvenli)
//   1 = Arka plan kaydı (sektörleri kademeli kaydeder, daha az lag ama crash riski)
// [OKUNUYOR] — Config'e yükleniyor ama kademeli kaydetme uygulanmadı.
SAVEBACKGROUND=0

// BACKUPLEVELS - Tutulacak yedek kayıt rotasyonu sayısı.
// Tür: integer (0-99)
// Varsayılan: 5
// Not: save_1/, save_2/ vb. oluşturur. 0 = yedek yok.
// [ÇALIŞIYOR] — WorldSaver yedek rotasyonu yapar.
BACKUPLEVELS=5

// SAVEFORMAT - Kaydetme dosya formatı.
// Değerler:
//   Text     = Klasik Sphere .scp metin formatı (insan okunabilir, büyük)
//   TextGz   = .scp.gz — aynı metin, gzip sarılmış (~%85 daha küçük)
//   Binary   = .sbin — tag-stream binary (aynı (key,value) semantikleri, şema yok)
//   BinaryGz = .sbin.gz — binary + gzip (en küçük)
// Varsayılan: BinaryGz (en küçük disk, en hızlı load)
// Not: Loader formatı dosya uzantısından otomatik algılar, değiştirmek eski
//      snapshot'ları bozmaz. Runtime'da .SAVEFORMAT komutuyla da değiştirilebilir.
// [ÇALIŞIYOR]
SAVEFORMAT=BinaryGz

// SAVESHARDS - Shard modu.
// Tür: integer (0-16)
// Varsayılan: 3 (paralel hash shard, 3 dosya)
// Değerler:
//   0     = Her zaman tek dosya, rolling kapalı (klasik Sphere)
//   1     = Size-based rolling: SAVESHARDSIZEMB'e göre 1, 2, 3... dosya
//   2-16  = Sabit paralel hash shard (N dosya, her biri kendi Task'inde yazılır)
// [ÇALIŞIYOR]
SAVESHARDS=3

// SAVESHARDSIZEMB - Rolling modunda dosya başına max boyut (MB).
// Tür: integer (>0)
// Varsayılan: 75 (BinaryGz'de ~4-6M item veya ~900K-1.8M NPC / shard)
// Not: Sadece SAVESHARDS=1 iken devrede. Tek dosya ile başlar, limiti
//      aşınca {base}.1.{ext}, {base}.2.{ext} olarak yenisini açar.
//      Küçük worldler tek dosya kalır (klasik Sphere davranışı).
// [ÇALIŞIYOR]
SAVESHARDSIZEMB=75

// ============================================================================
// DÜNYA ZAMANLAMASI
// ============================================================================

// GAMEMINUTELENGTH - Oyun içi bir dakikanın gerçek dünya karşılığı (saniye).
// Tür: integer (saniye, 1-600)
// Varsayılan: 8
// Not: 8'de tam oyun içi gün (24s) = 8*60*24 = 11520 sn ≈ 3.2 saat gerçek zaman.
// [OKUNUYOR] — Config'e yükleniyor ama GameWorld.GameMinuteLengthMs sabit 20000ms
//              kullanıyor, bu değer oraya aktarılmıyor.
GAMEMINUTELENGTH=8

// TICKPERIOD - Ana oyun döngüsü aralığı (milisaniye).
// Tür: integer (ms, 50-5000)
// Varsayılan: 250
// Not: Sunucu yanıt hızını belirler. 250ms = saniyede 4 tick.
// [UYGULANMADI] — SphereConfig'de tanımlı değil. Program.cs sabit 250ms kullanır.
TICKPERIOD=250

// SECTORSLEEP - Kullanılmayan bir sektörün "uykuya" geçmeden önceki süresi (dakika).
// Tür: integer (dakika, 0=asla uyuma)
// Varsayılan: 1
// Not: Uyuyan sektörler NPC AI, item çürüme, regen işlemez. Oyuncu girince uyanır.
// [OKUNUYOR] — Config'e yükleniyor ama sektör uyku mantığına bağlı değil.
SECTORSLEEP=1

// MAPCACHETIME - Harita veri bloklarının bellekte önbelleğe alma süresi (saniye).
// Tür: integer (saniye, 0=önbellek yok)
// Varsayılan: 120
// [UYGULANMADI] — SphereConfig'de tanımlı değil.
MAPCACHETIME=120

// ============================================================================
// GÖRÜŞ ALANI & MESAFE
// ============================================================================

// MAPVIEWSIZE - Varsayılan istemci görüş mesafesi (tile yarıçapı).
// Tür: integer (5-24)
// Varsayılan: 18
// Not: Bu mesafenin ötesindeki nesneler istemciye gönderilmez.
// [OKUNUYOR] — Config'e yükleniyor ama GameClient sabit UpdateRange=18 kullanır,
//              config'ten okumaz.
MAPVIEWSIZE=18

// MAPVIEWSIZEMAX - İzin verilen maksimum görüş mesafesi (.SET VIEWRANGE veya EC istemci).
// Tür: integer (5-24)
// Varsayılan: 24
// [OKUNUYOR] — Config'e yükleniyor ama ViewRange clamp'i buna bakmıyor.
MAPVIEWSIZEMAX=24

// MAPVIEWRADAR - İstemcilere radar harita güncellemelerini gönder.
// Tür: boolean (0/1)
// Varsayılan: 0
// [UYGULANMADI] — SphereConfig'de tanımlı değil.
MAPVIEWRADAR=0

// ============================================================================
// STAT & YETENEĞİ AYARLARI
// ============================================================================

// MAXBASESKILL - Bireysel yetenek başına maksimum puan (ondalıklı).
// Tür: integer (0-99999)
// Varsayılan: 1200
// Not: 1200 = 120.0 yetenek puanı. Toplam yetenek sınırı ayrıdır.
// [ÇALIŞIYOR] — SkillEngine.SkillSumMaxOverride olarak kullanılır.
MAXBASESKILL=1200

// MAXPOLYSTATS - Polymorph halinde maksimum stat değeri.
// Tür: integer (0-500)
// Varsayılan: 150
