// Varsayilan: 0
// Degerler:
//   0 = Sadece onceden olusturulmus hesaplar login olabilir (prod icin onerilir)
//   1 = Ilk login denemesinde hesap otomatik olusturulur
// [CALISIYOR] — AccountManager.AutoCreateAccounts bu ayardan beslenir.
ACCAPP=0

// MAXCHARSPERACCOUNT - Hesap başına maksimum karakter yuvası.
// Tür: integer (1-7)
// Varsayılan: 7
// Not: UO istemcileri en fazla 7 karakter yuvasını destekler.
// [ÇALIŞIYOR] — AccountManager karakter oluşturma kontrolünde kullanır.
MAXCHARSPERACCOUNT=7

// MINCHARDELETETIME - Karakterin kalıcı olarak silinmeden önceki minimum bekleme süresi (gün).
// Tür: integer (gün, 0-365)
// Varsayılan: 7
// Not: Kazara silmeyi önler. 0 = anında sil.
// [OKUNUYOR] — Config'e yükleniyor ama karakter silme akışı buna bakmıyor.
MINCHARDELETETIME=7

// MD5PASSWORDS - Hesap şifrelerini MD5 hash olarak sakla.
// Tür: boolean (0/1)
// Varsayılan: 0
// Değerler:
//   0 = Düz metin şifreler (güvensiz ama tüm araçlarla uyumlu)
//   1 = MD5 hash şifreler (daha güvenli, tek yönlü)
// [ÇALIŞIYOR] — AccountManager şifre karşılaştırmasında kullanır.
MD5PASSWORDS=0

// AUTORESDISP - İstemci sürümüne göre çözünürlük/görüntü türünü otomatik ayarla.
