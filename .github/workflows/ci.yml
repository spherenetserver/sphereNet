name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: panel/package-lock.json

      - name: Install panel dependencies
        working-directory: panel
        run: npm ci

      - name: Lint panel
        working-directory: panel
        run: npm run lint

      - name: Test panel
        working-directory: panel
        run: npm run test

      - name: Audit panel dependencies
        working-directory: panel
        run: npm audit --audit-level=high

      - name: Build panel
        working-directory: panel
        run: npm run build

      - name: Restore
        run: dotnet restore sphereNet.sln

      - name: Build
        run: dotnet build sphereNet.sln --configuration Debug --no-restore

      - name: Build Release
        run: dotnet build sphereNet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/SphereNet.Tests/SphereNet.Tests.csproj --configuration Debug --no-build --no-restore --collect:"XPlat Code Coverage" --results-directory TestResults --verbosity normal

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
