// [ÇALIŞIYOR] — Client version/era ResDisp'e çevrilir ve hesapta saklanır.
AUTORESDISP=1

// ============================================================================
// AĞ PERFORMANS AYARLARI
// ============================================================================

// USEASYNCNETWORK - Asenkron soket I/O kullan.
// Tür: integer (0-2)
// Varsayılan: 0
// Değerler:
//   0 = Senkron I/O (en basit, varsayılan)
//   1 = İstemci başına 1 thread ile async
//   2 = Thread pool ile async (yüksek yük için en iyi)
// [UYGULANMADI] — SphereConfig'de tanımlı değil. NetworkManager tamamen senkron çalışır.
//                 Ana döngüde Poll → Receive → Process → Send sırası ile tek thread'te işler.
//                 Async networking yok, ancak resync mekanizması (paket 0x22, .RESYNC komutu) uygulandı.
USEASYNCNETWORK=0

// NETWORKTHREADS - Adanmış ağ I/O thread sayısı.
// Tür: integer (0-32, 0=ana thread ağ işlemlerini yönetir)
// Varsayılan: 0
// [OKUNUYOR] — Config'e yükleniyor ama multi-thread networking uygulanmadı.
NETWORKTHREADS=0

// NETWORKTHREADPRIORITY - Ağ threadlerinin önceliği.
// Tür: integer (0-4)
// Varsayılan: 0
// Değerler: 0=Normal, 1=NormalÜstü, 2=Yüksek, 3=EnYüksek, 4=GerçekZaman
// [UYGULANMADI] — SphereConfig'de tanımlı değil.
NETWORKTHREADPRIORITY=0

// MAXPACKETSPERTICK - Tick başına istemci başına işlenen maksimum gelen paket sayısı.
// Tür: integer (0=sınırsız)
// Varsayılan: 0
// Not: Paket flood'u önler. Prodüksiyon için 30-50 önerilir.
// [OKUNUYOR] — Config'e yükleniyor ama NetworkManager paket limiti uygulamıyor.
MAXPACKETSPERTICK=0

// MAXSIZECLIENTIN - Tick başına istemci başına maksimum gelen veri boyutu (byte).
// Tür: integer (byte, 0=sınırsız) | Varsayılan: 0
// [UYGULANMADI] — SphereConfig'de tanımlı değil. NetState sabit 65536 byte tampon kullanır.
MAXSIZECLIENTIN=0

// MAXSIZECLIENTOUT - Tick başına istemci başına maksimum giden veri boyutu (byte).
// Tür: integer (byte, 0=sınırsız) | Varsayılan: 0
// [UYGULANMADI]
MAXSIZECLIENTOUT=0

// MAXSIZEPERTICK - Tick başına toplam ağ I/O sınırı (byte).
// Tür: integer (byte, 0=sınırsız) | Varsayılan: 0
// [UYGULANMADI]
MAXSIZEPERTICK=0

// MAXQUEUESIZE - İstemci başına maksimum kuyruktaki paket sayısı (aşılırsa bağlantı kesilir).
// Tür: integer (1-500)
// Varsayılan: 75
// [UYGULANMADI] — SphereConfig'de tanımlı değil.
MAXQUEUESIZE=75

// NETTTL - Boşta bağlantılar için yaşam süresi (saniye).
// Tür: integer (saniye, 30-3600)
// Varsayılan: 300
// Not: Bu süre boyunca aktivite olmayan bağlantılar kapatılır.
// [ÇALIŞIYOR] — SphereConfig'de okunuyor, idle bağlantı zaman aşımı uygulanıyor.
NETTTL=300

// USEEXTRABUFFER - Bağlantı başına ekstra çıktı tamponu ayır.
// Tür: boolean (0/1) | Varsayılan: 0
// [UYGULANMADI]
USEEXTRABUFFER=0

// USEPACKETPRIORITY - Giden paketler için öncelik kuyruğu etkinleştir.
// Tür: boolean (0/1) | Varsayılan: 0
// [UYGULANMADI]
USEPACKETPRIORITY=0

// ============================================================================
// ÇEŞİTLİ AYARLAR
// ============================================================================

// COMMANDPREFIX - Oyun içi GM komutları için önek karakter.
// Tür: string (tek karakter)
// Varsayılan: "."
// Örnek: "." ile oyun içinde ".ADD 0x0F51" yazınca eşya oluşturur.
// [ÇALIŞIYOR] — SpeechEngine.CommandPrefix olarak set edilir.
COMMANDPREFIX=.

// DEFAULTCOMMANDLEVEL - Yeni hesaplar için varsayılan PrivLevel.
// Tür: integer (0-7)
// Varsayılan: 7
// Değerler:
//   0 = Misafir (çok sınırlı)
//   1 = Oyuncu (normal)
//   2 = Danışman (sınırlı GM)
//   3 = Kahin (Seer)
//   4 = GM
//   5 = Geliştirici (Dev)
//   6 = Yönetici (Admin)
//   7 = Sahip (Owner)
// [OKUNUYOR] — Config'e yükleniyor ama yeni hesap oluşturmada kullanılmıyor,
//              AccountManager sabit PrivLevel kullanıyor.
DEFAULTCOMMANDLEVEL=1

// EXPERIMENTAL - Deneysel özellik bayrakları.
// Tür: hex/integer
// Varsayılan: 0
// Bitler:
//   0x0001 = Yeni hareket doğrulama
//   0x0002 = Yeni yol bulma algoritması
//   0x0004 = Genişletilmiş script özellikleri
//   0x0008 = Yeni LOS algoritması
//   0x0010 = Async world save
//   0x0020 = Optimize sektör tick
// Not: Kararsız/test edilmemiş özellikler. Kendi sorumluluğunuzda kullanın.
// [OKUNUYOR] — Config'e yükleniyor ama hiçbir bit kontrol edilmiyor.
EXPERIMENTAL=0

// OPTIONFLAGS - Genel sunucu seçenek bayrakları.
// Tür: hex/integer
// Varsayılan: 0
// Bitler:
//   0x0001 = Çürümeyi tamamen devre dışı bırak
//   0x0002 = Her yerde güvenli takas izin ver
//   0x0004 = Canavarlar eşyaları ceset yerine yere bırakır
//   0x0008 = Fazla kiloda koşma yasak
//   0x0010 = Satıcılar dinamik fiyatlandırma kullansın
//   0x0020 = Sadece kamplarda yatak çıkışı
//   0x0040 = Altını bankadan önce çantadan çek
// [OKUNUYOR] — Config'e yükleniyor ama hiçbir bit kontrol edilmiyor.
// NOT / NOTE:
// OPTIONFLAGS is defined once above for active SphereNet option bits.
// OPTIONFLAGS aktif SphereNet bitleri için yukarıda bir kez tanımlıdır.
// Do not add a second active OPTIONFLAGS line here; the INI parser uses the last value.
// Buraya ikinci aktif OPTIONFLAGS satırı eklemeyin; INI parser son değeri kullanır.
// [DOKUMAN / DOCUMENTATION ONLY]
// OPTIONFLAGS=0

// ADVANCEDLOS - Görüş hattı (Line-of-Sight) hesaplama yöntemi.
// Tür: integer (0-2)
// Varsayılan: 0
// Değerler:
//   0 = Sphere klasik (sadece 2D mesafe kontrolü)
//   1 = Standart LOS (arazi + statik engeller)
//   2 = Gelişmiş LOS (tam 3D ışın izleme)
// Not: Yüksek değerler daha doğru ama daha fazla CPU kullanır.
// [UYGULANMADI] — SphereConfig'de tanımlı değil. TerrainEngine.CanSeeLOS mevcut ama
//                 hiçbir yerden çağrılmıyor.
ADVANCEDLOS=0

// DISTANCEFORMULA - Mesafe hesaplama yöntemi.
// Tür: integer (0-1)
// Varsayılan: 1
// Değerler:
//   0 = Chebyshev mesafesi (max(|dx|, |dy|)) — UO standart
//   1 = Manhattan mesafesi (|dx| + |dy|)
// [UYGULANMADI] — SphereConfig'de tanımlı değil. Point3D.GetDistanceTo sabit Chebyshev kullanır.
DISTANCEFORMULA=1

// FLIPDROPPEDITEMS - Yere bırakılan eşyaları rastgele çevir (grafik aynala).
// Tür: boolean (0/1) | Varsayılan: 0
// [UYGULANMADI]
FLIPDROPPEDITEMS=0

// CANUNDRESSPETS - Oyuncuların petlerinin eşyalarını çıkarmasına izin ver.
// Tür: boolean (0/1) | Varsayılan: 0
// [UYGULANMADI]
CANUNDRESSPETS=0

// CHATFLAGS - Sohbet sistemi bayrakları.
// Tür: hex/integer | Varsayılan: 0
// Bitler: 0x01=Genel sohbet, 0x02=Personel kanalı, 0x04=Tüm sohbeti logla
// [UYGULANMADI]
CHATFLAGS=0

// TOOLTIPMODE - Tooltip (AOS özellik) görüntüleme modu.
// Tür: integer (0-2)
// Varsayılan: 1
// Değerler:
//   0 = Devre dışı (tooltip gönderilmez)
//   1 = Sürüm/hash gönder; değişmiş veya istenmişse tam tooltip gönder
//   2 = Her zaman tam tooltip gönder
// [ÇALIŞIYOR] — 0xDC revision ve 0xD6 property list akışını belirler.
TOOLTIPMODE=1

// TOOLTIPCACHE - Tooltip verisinin yeniden hesaplanmadan önce önbelleğe alma süresi (saniye).
// Tür: integer (saniye, 0-600) | Varsayılan: 30
// [ÇALIŞIYOR] — Hesaplanan property list bu süre boyunca yeniden kullanılır.
TOOLTIPCACHE=30

// TELEPORTEFFECTNPC / TELEPORTEFFECTPLAYERS / TELEPORTEFFECTSTAFF
// Işınlanma sırasında gösterilen görsel efekt ID'si.
// Tür: integer (efekt grafik ID, 0=efekt yok) | Varsayılan: 0
// [UYGULANMADI]
TELEPORTEFFECTNPC=0
TELEPORTEFFECTPLAYERS=0
TELEPORTEFFECTSTAFF=0

// TELEPORTSOUNDNPC / TELEPORTSOUNDPLAYERS / TELEPORTSOUNDSTAFF
// Işınlanma sırasında çalınan ses ID'si.
// Tür: integer (ses ID, 0=ses yok) | Varsayılan: 0
// [UYGULANMADI]
TELEPORTSOUNDNPC=0
TELEPORTSOUNDPLAYERS=0
TELEPORTSOUNDSTAFF=0

// GENERICSOUNDS - Genel aksiyon seslerini etkinleştir (vuruş, ıskalama, parry vb.)
// Tür: boolean (0/1)
// Varsayılan: 1
// [UYGULANMADI]
GENERICSOUNDS=1

// WALKBUFFER - Hareket jeton kovasının kapasitesi (izin verilen ani adım patlaması).
// Tür: integer (1-100)
// Varsayılan: 75
// Not: Hız hilesine karşı tampon. Her başarılı adım 1 jeton harcar; kova boşalınca
//      WALKREGEN hızında dolar. Çok düşük değerler (örn. 2) koşan oyuncuyu boğar:
//      adımlar walk_buffer ile reddedilir, client geri sıçrar → "takılma/rubber-band".
// [AKTİF] — GameClient.WalkBufferMax olarak token-bucket hareket geçidinde kullanılır.
WALKBUFFER=75

// WALKREGEN - Saniyede yenilenen hareket jetonu sayısı (RATE, periyot DEĞİL).
// Tür: integer (1-100) | Varsayılan: 25
// Not: Koşan oyuncu ~5 adım/sn ister; bu değer en az o kadar olmalı (default 25
//      bol pay bırakır). 1 gibi düşük değerler saniyede 1 adıma kilitler.
// [AKTİF] — GameClient.WalkRegenPerSecond olarak kullanılır.
WALKREGEN=25

// DECAYTIMER - Yerdeki eşyaların varsayılan çürüme süresi (dakika).
// Tür: integer (dakika, 1-1440)
// Varsayılan: 30
// [OKUNUYOR] — Config'e yükleniyor ama GameWorld.DefaultDecayTimeMs sabit değer kullanır.
DECAYTIMER=30

// STATERECORDINGENABLED - Karakter durum kayıt sistemi (SQLite).
// Tür: boolean (0/1)
// Varsayılan: 1
// Değerler:
//   0 = Devre dışı — SQLite DB oluşturulmaz, performans etkisi sıfır
//   1 = Etkin — tüm karakterlerin pozisyon/ekipman snapshot'ları kaydedilir,
//       .SREC komutu ile admin izleyebilir, paylaşılabilir kayıtlar oluşturulabilir
// [ÇALIŞIYOR] — Program.cs StateRecorder init ve tick'i bu flag'e bakar.
STATERECORDINGENABLED=1

// STATERECORDPLAYERSONLY - Sadece oyuncu karakterlerini kaydet (NPC'leri atla).
// Tür: boolean (0/1)
// Varsayılan: 1
// Değerler:
//   0 = Tüm karakterler kaydedilir (yüksek NPC sayısında performans etkisi!)
//   1 = Sadece oyuncu karakterleri kaydedilir (önerilen)
// Not: 100K+ NPC'li dünyalarda 0 yapılması ciddi CPU yükü oluşturur.
// [ÇALIŞIYOR]
STATERECORDPLAYERSONLY=1

// STATERECORDMOVESCANMS - Hareket tarama aralığı (milisaniye).
// Tür: integer (ms, min 500)
// Varsayılan: 2000
// Not: Düşük değer = daha hassas hareket kaydı, daha fazla CPU/disk kullanımı.
// [ÇALIŞIYOR]
STATERECORDMOVESCANMS=2000

// STATERECORDSNAPSHOTMS - Durum snapshot aralığı (milisaniye).
// Tür: integer (ms, min 5000)
// Varsayılan: 15000
// Not: Ekipman, HP, pozisyon gibi tam durum snapshot'ı bu aralıkla alınır.
// [ÇALIŞIYOR]
STATERECORDSNAPSHOTMS=15000

// MACROENABLED - Oyuncu makro kayit/oynatma sistemi.
// Tür: boolean (0/1)
// Varsayılan: 1
// Değerler:
//   0 = Devre dışı — .MACRO komutu çalışmaz
//   1 = Etkin — oyuncular aksiyonlarını kaydedip tekrarlayabilir (mining, crafting vb.)
// Not: Tüm aksiyonlar normal oyun motoru üzerinden çalışır — skill check, timer,
//      ağırlık limiti, başarı/başarısızlık hepsi standart kurallarla işler.
// [ÇALIŞIYOR]
MACROENABLED=1

// MACROMAXSTEPS - Bir makroda kaydedilebilecek maksimum adım sayısı.
// Tür: integer (5-200)
// Varsayılan: 50
// [ÇALIŞIYOR]
MACROMAXSTEPS=50

// MACROMAXLOOPMINUTES - Makro loop modunda maksimum çalışma süresi (dakika).
// Tür: integer (1-1440)
// Varsayılan: 120 (= 2 saat)
// [ÇALIŞIYOR]
MACROMAXLOOPMINUTES=120

// NOWEATHER - Hava efektlerini devre dışı bırak (yağmur, kar).
// Tür: boolean (0/1) | Varsayılan: 0
// [UYGULANMADI]
NOWEATHER=0

// LIGHTDAY - Gündüz aydınlık seviyesi (0=en parlak, 30=en karanlık).
// Tür: integer (0-30)
// Varsayılan: 0
// [OKUNUYOR] — Config'e yükleniyor ama GameWorld.GlobalLight sabit formül kullanır.
LIGHTDAY=0

// LIGHTNIGHT - Gece aydınlık seviyesi (0=en parlak, 30=en karanlık).
// Tür: integer (0-30)
// Varsayılan: 25
// [OKUNUYOR] — Config'e yükleniyor ama GameWorld.GlobalLight sabit formül kullanır.
LIGHTNIGHT=25

// DUNGEONLIGHT - Zindan bölgelerindeki aydınlık seviyesi.
// Tür: integer (0-30)
// Varsayılan: 27
// [OKUNUYOR] — Config'e yükleniyor ama zindan bölgesi kontrolünde kullanılmıyor.
DUNGEONLIGHT=27

// SEASONMODE - Season akış modu.
// Tür: string veya integer
//   Auto / 0   = sezonlar interval doldukça otomatik ilerler
//   Manual / 1 = sezon sabit kalır; script/admin tarafı değiştirir
// Varsayılan: Auto
// [ÇALIŞIYOR] — WeatherEngine season otoritesini bu ayardan kurar.
SEASONMODE=Auto

// SEASONDEFAULT - Sunucu açıldığında başlayacak sezon.
// Tür: integer (0-4)
//   0=Spring, 1=Summer, 2=Fall, 3=Winter, 4=Desolation
// Varsayılan: 0
// [ÇALIŞIYOR] — Login/resync/tick aynı season state'ini buradan başlatır.
SEASONDEFAULT=0

// SEASONCHANGEINTERVALMINUTES - Auto modda sezon geçiş aralığı (dakika).
// Tür: integer (0=auto cycle kapalı, 1+ = dakika)
// Varsayılan: 30
// Not: Manual modda bu değer ignored edilir.
// [ÇALIŞIYOR]
SEASONCHANGEINTERVALMINUTES=30

// COLORNOTO* - Tek tiklamada cikan isim etiketinin (notoriety) hue'su.
// DEGER HEX'tir (Sphere usulu): orn. 22=kirmizi, 59=mavi, 3b2=gri, 90=turuncu.
// 0 = motorun yerlesik varsayilanini kullan (mavi/kirmizi/gri...). DIKKAT: hue 0
// asla "siyah" demek istemez; 0 yazarsan varsayilan renk uygulanir, siyah DEGIL.
// Bu anahtarlar yukaridaki "Default color settings for characters names" bloguyla
// AYNIDIR (ColorNotoGood=059 vb.); ikisini birden tanimlama, sonuncusu kazanir.
// Ozel renk istemiyorsan bu satirlari yorumda birak; varsayilanlar zaten renklidir.
//ColorNotoGood=059        // mavi (iyi/masum)
//ColorNotoCriminal=03b2   // gri (suclu)
//ColorNotoEvil=022        // kirmizi (kotu/katil)
//ColorNotoDefault=03b2    // gri (digerleri)
//ColorHidden=0            // 0 = istemci varsayilani
//ColorInvis=0             // 0 = istemci varsayilani

