// ============================================================================

// SpeechSelf - Speech block(s) evaluated when a player speaks.
// SpeechSelf - Oyuncu konuştuğunda çalıştırılacak SPEECH blokları.
// Type / Tür: comma-separated SPEECH defnames / virgülle ayrılmış SPEECH defname listesi
// Source-X example / Source-X örneği: SpeechSelf=spk_player
// [CALISIYOR / WORKING] — TriggerDispatcher runs matching [SPEECH] patterns before built-in player keywords.
// [ÇALIŞIYOR] — TriggerDispatcher eşleşen [SPEECH] patternlerini yerleşik oyuncu kelimelerinden önce çalıştırır.
SpeechSelf=spk_player

// SpeechPet - Speech block(s) evaluated when an NPC/pet hears speech.
// SpeechPet - NPC/pet konuşmayı duyduğunda çalıştırılacak SPEECH blokları.
// Type / Tür: comma-separated SPEECH defnames / virgülle ayrılmış SPEECH defname listesi
// Source-X example / Source-X örneği: SpeechPet=spk_pet
// [CALISIYOR / WORKING] — Runs after built-in service keyword handling, before CHARDEF speech fallback finishes.
// [ÇALIŞIYOR] — Yerleşik servis kelimelerinden sonra, CHARDEF speech zinciri tamamlanmadan çalışır.
SpeechPet=spk_pet

// EventsPet - Global EVENTS applied to all non-player characters.
// EventsPet - Tüm NPC/pet karakterlere uygulanan global EVENTS listesi.
// Type / Tür: comma-separated EVENTS defnames / virgülle ayrılmış EVENTS defname listesi
// Source-X example / Source-X örneği: EventsPet=e_npc_generic_event
// [CALISIYOR / WORKING] — Character trigger chain step: EVENTS -> TEVENTS -> CHARDEF -> EventsPet.
// [ÇALIŞIYOR] — Karakter trigger sırası: EVENTS -> TEVENTS -> CHARDEF -> EventsPet.
EventsPet=e_npc_generic_event

// EventsPlayer - Global EVENTS applied to all player characters.
// EventsPlayer - Tüm oyuncu karakterlere uygulanan global EVENTS listesi.
// Type / Tür: comma-separated EVENTS defnames / virgülle ayrılmış EVENTS defname listesi
// Source-X example / Source-X örneği: EventsPlayer=e_player_generic_event,e_player_crafting_event
// [CALISIYOR / WORKING] — Character trigger chain step: EVENTS -> TEVENTS -> CHARDEF -> EventsPlayer.
// [ÇALIŞIYOR] — Karakter trigger sırası: EVENTS -> TEVENTS -> CHARDEF -> EventsPlayer.
EventsPlayer=e_player_generic_event,e_player_crafting_event

// EventsRegion - Optional global EVENTS applied to region and room event dispatch.
// EventsRegion - Region ve room event akışına eklenen opsiyonel global EVENTS listesi.
// Type / Tür: comma-separated EVENTS defnames / virgülle ayrılmış EVENTS defname listesi
// Empty = disabled / Boş = devre dışı.
// [CALISIYOR / WORKING]
EventsRegion=

// EventsItem - Optional global EVENTS applied to all items.
// EventsItem - Tüm itemlara uygulanan opsiyonel global EVENTS listesi.
// Type / Tür: comma-separated EVENTS defnames / virgülle ayrılmış EVENTS defname listesi
// Empty = disabled / Boş = devre dışı.
// [CALISIYOR / WORKING]
EventsItem=

