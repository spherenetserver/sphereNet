MAXHOUSESACCOUNT=1

// MAXHOUSESGUILD - Lonca'ya ait maksimum ev sayısı.
// Tür: integer (0-100, 0=devre dışı)
// Varsayılan: 0
// [UYGULANMADI] — SphereConfig'de tanımlı değil.
MAXHOUSESGUILD=0

// MAXSHIPSPLAYER - Tek bir karakterin sahip olabileceği maksimum gemi sayısı.
